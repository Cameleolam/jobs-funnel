{% extends "base.html" %}
{% block content %}

<div class="calibration-header">
  <div>
    <h2>Calibration</h2>
    <p class="text-muted">Active scoring knobs and generated calibration proposals.</p>
  </div>
  <form hx-post="/calibration/proposals"
        hx-target="#calibration-content"
        hx-swap="innerHTML"
        class="calibration-actions">
    <label>Window</label>
    <input type="number" name="window_days" value="90" min="7" max="365">
    <button class="btn btn-primary btn-sm" type="submit">Generate proposal</button>
  </form>
</div>

<div id="calibration-content">
  {% include "partials/calibration_content.html" %}
</div>

{% endblock %}

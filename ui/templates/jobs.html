{% extends "base.html" %}
{% block content %}

<!-- Stats bar -->
<div id="stats-bar" hx-get="/stats" hx-trigger="every 30s" hx-swap="innerHTML">
  {% include "partials/stats.html" %}
</div>

<!-- Filter bar -->
<form class="filter-bar"
      hx-get="/jobs"
      hx-target="#job-table-body"
      hx-trigger="change, input[name='search'] changed delay:300ms"
      hx-include="[name]"
      hx-indicator="#filter-spinner">

  <input type="hidden" name="sort" value="crawled_at">
  <input type="hidden" name="order" value="desc">

  <label>Decision</label>
  <select name="decision">
    <option value="">All</option>
    <option value="PASS">PASS</option>
    <option value="MAYBE">MAYBE</option>
    <option value="SKIP">SKIP</option>
  </select>

  <label>Status</label>
  <select name="applied">
    <option value="">All</option>
    <option value="pending">Not reviewed</option>
    <option value="applied">Applied</option>
    <option value="dismissed">Dismissed</option>
  </select>

  <label>Score</label>
  <input type="number" name="min_score" value="0" min="0" max="10" title="Min score">
  <span>-</span>
  <input type="number" name="max_score" value="10" min="0" max="10" title="Max score">

  <label>Search</label>
  <input type="search" name="search" placeholder="Company or title...">

  <span class="htmx-indicator" id="filter-spinner"><span class="spinner"></span></span>

  <div class="ml-auto">
    <button type="button" class="btn btn-primary btn-sm" onclick="downloadExcel()">Download Excel</button>
  </div>
</form>

<!-- Jobs table -->
<table class="jobs-table">
  <thead>
    <tr>
      <th class="sortable" data-sort="crawled_at">Date <span class="sort-arrow">&#9660;</span></th>
      <th class="sortable" data-sort="company">Company</th>
      <th class="sortable" data-sort="title">Role</th>
      <th class="sortable" data-sort="location">Location</th>
      <th>Salary</th>
      <th class="sortable" data-sort="fit_score">Score</th>
      <th class="sortable" data-sort="decision">Decision</th>
      <th>CV</th>
      <th>Info</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="job-table-body"
         hx-get="/jobs"
         hx-trigger="load"
         hx-swap="innerHTML"
         hx-indicator="#filter-spinner">
  </tbody>
</table>

{% endblock %}

{% extends "base.html" %}
{% block content %}

<!-- Stats bar -->
<div id="stats-bar" hx-get="/stats" hx-trigger="every 30s" hx-swap="innerHTML">
  {% include "partials/stats.html" %}
</div>

<!-- Filter bar -->
<form class="filter-bar"
      hx-get="/jobs"
      hx-target="#job-table-body"
      hx-trigger="change, input[name='search'] changed delay:300ms"
      hx-include="[name]"
      hx-indicator="#filter-spinner">

  <input type="hidden" name="sort" value="{{ filters.sort }}">
  <input type="hidden" name="order" value="{{ filters.order }}">

  <label>View</label>
  <select name="view">
    <option value="" {% if filters.view == "" %}selected{% endif %}>Jobs</option>
    <option value="review" {% if filters.view == "review" %}selected{% endif %}>Review queue</option>
    <option value="error" {% if filters.view == "error" %}selected{% endif %}>Errors (retrying)</option>
    <option value="dead" {% if filters.view == "dead" %}selected{% endif %}>Dead letters</option>
    <option value="failed" {% if filters.view == "failed" %}selected{% endif %}>All failed</option>
    <option value="duplicates" {% if filters.view == "duplicates" %}selected{% endif %}>Duplicates</option>
  </select>
  <a class="btn btn-warn btn-sm" href="/?view=review">Review Queue</a>

  <label>Decision</label>
  <select name="decision">
    <option value="" {% if filters.decision == "" %}selected{% endif %}>All</option>
    <option value="PASS" {% if filters.decision == "PASS" %}selected{% endif %}>PASS</option>
    <option value="MAYBE" {% if filters.decision == "MAYBE" %}selected{% endif %}>MAYBE</option>
    <option value="SKIP" {% if filters.decision == "SKIP" %}selected{% endif %}>SKIP</option>
  </select>

  <label>Status</label>
  <select name="applied">
    <option value="" {% if filters.applied == "" %}selected{% endif %}>All</option>
    <option value="pending" {% if filters.applied == "pending" %}selected{% endif %}>Not reviewed</option>
    <option value="interested" {% if filters.applied == "interested" %}selected{% endif %}>Interested</option>
    <option value="applied" {% if filters.applied == "applied" %}selected{% endif %}>Applied</option>
    <option value="in_process" {% if filters.applied == "in_process" %}selected{% endif %}>In Process</option>
    <option value="offer" {% if filters.applied == "offer" %}selected{% endif %}>Offer</option>
    <option value="rejected" {% if filters.applied == "rejected" %}selected{% endif %}>Rejected</option>
    <option value="dismissed" {% if filters.applied == "dismissed" %}selected{% endif %}>Dismissed</option>
  </select>

  <label>Score</label>
  <input type="number" name="min_score" value="{{ filters.min_score }}" min="0" max="10" title="Min score">
  <span>-</span>
  <input type="number" name="max_score" value="{{ filters.max_score }}" min="0" max="10" title="Max score">

  <label>Search</label>
  <input type="search" name="search" value="{{ filters.search }}" placeholder="Company or title...">

  <div class="filter-secondary">
    <label title="Hide staffing-agency postings">
      <input type="checkbox" name="hide_staffing" value="true" {% if filters.hide_staffing %}checked{% endif %}> Hide staffing
    </label>
    <label title="Hide on-site jobs outside your country pack's allowlist">
      <input type="checkbox" name="hide_geo" value="true" {% if filters.hide_geo %}checked{% endif %}> Hide off-country
    </label>
    <label title="Only show jobs in English">
      <input type="checkbox" name="english_only" value="true" {% if filters.english_only %}checked{% endif %}> English only
    </label>
    <label title="Only show jobs crawled in the last 10 days">
      <input type="hidden" name="recent_only" value="false">
      <input type="checkbox" name="recent_only" value="true" {% if filters.recent_only %}checked{% endif %}> Last 10 days
    </label>
    <label title="Hide jobs marked rejected or nope">
      <input type="checkbox" name="hide_rejected" value="true" {% if filters.hide_rejected %}checked{% endif %}> Hide rejected/nope
    </label>
  </div>

  <span class="htmx-indicator" id="filter-spinner"><span class="spinner"></span></span>

  <div class="ml-auto" style="display:flex; gap:0.4rem;">
    <a href="/jobs/new" class="btn btn-primary btn-sm" style="text-decoration:none;">+ Add job</a>
    <button type="button" class="btn btn-primary btn-sm" onclick="downloadExcel()">Download Excel</button>
  </div>
</form>

<!-- Jobs table -->
<table class="jobs-table">
  <thead>
    <tr>
      <th class="sortable" data-sort="crawled_at">Date</th>
      <th class="sortable" data-sort="company">Company</th>
      <th class="sortable" data-sort="title">Role</th>
      <th class="sortable" data-sort="location">Location</th>
      <th>Salary</th>
      <th class="sortable active" data-sort="fit_score">Score <span class="sort-arrow">&#9660;</span></th>
      <th class="sortable" data-sort="decision">Decision</th>
      <th>Info</th>
      <th class="sortable" data-sort="user_status">Status</th>
    </tr>
  </thead>
  <tbody id="job-table-body"
         hx-get="/jobs{% if jobs_query_string %}?{{ jobs_query_string }}{% endif %}"
         hx-trigger="load"
         hx-swap="innerHTML"
         hx-indicator="#filter-spinner">
  </tbody>
</table>

{% endblock %}

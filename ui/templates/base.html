<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jobs Funnel</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      line-height: 1.5;
    }

    .container { max-width: 1600px; margin: 0 auto; padding: 1rem; }

    /* ── Stats bar ──────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      align-items: center;
    }
    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      text-align: center;
      min-width: 90px;
    }
    .stat-card .label { font-size: 0.75rem; color: #666; text-transform: uppercase; }
    .stat-card .value { font-size: 1.4rem; font-weight: 700; }
    .stat-card.pass .value { color: #16a34a; }
    .stat-card.maybe .value { color: #ca8a04; }
    .stat-card.skip .value { color: #9ca3af; }
    .stat-card.pending .value { color: #2563eb; }
    .stat-card.applied .value { color: #7c3aed; }
    .stat-card.dismissed .value { color: #6b7280; }

    /* ── Filter bar ─────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1rem;
      background: #fff;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .filter-bar label { font-size: 0.8rem; color: #555; }
    .filter-bar select,
    .filter-bar input {
      padding: 0.35rem 0.6rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .filter-bar input[type="number"] { width: 60px; }
    .filter-bar input[type="search"] { width: 200px; }

    /* ── Buttons ─────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.35rem 0.8rem;
      border: none;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-pass { background: #dcfce7; color: #166534; }
    .btn-skip { background: #f3f4f6; color: #374151; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-warn { background: #fef3c7; color: #92400e; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }

    /* ── Table ────────────────────────────────────── */
    .jobs-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .jobs-table th {
      background: #f9fafb;
      padding: 0.6rem 0.8rem;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #666;
      border-bottom: 2px solid #e5e7eb;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .jobs-table th:hover { color: #111; }
    .jobs-table th .sort-arrow { font-size: 0.6rem; color: #999; margin-left: 0.2rem; }
    .jobs-table th.active .sort-arrow { color: #2563eb; }
    .jobs-table td {
      padding: 0.5rem 0.8rem;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.85rem;
      vertical-align: top;
    }
    .jobs-table tr.job-row { cursor: pointer; transition: background 0.1s; }
    .jobs-table tr.job-row:hover { background: #fafafa; }

    /* Row colors */
    tr.decision-PASS { border-left: 3px solid #16a34a; }
    tr.decision-MAYBE { border-left: 3px solid #ca8a04; }
    tr.decision-SKIP { border-left: 3px solid #d1d5db; }
    tr.status-pending { border-left: 3px solid #2563eb; }
    tr.needs-action { border-left: 3px solid #ef4444; background: #fef2f2; }
    tr.needs-action:hover { background: #fee2e2; }
    tr.applied-done { border-left: 3px solid #16a34a; background: #f0fdf4; }
    tr.applied-done:hover { background: #dcfce7; }
    tr.dismissed-done { border-left: 3px solid #9ca3af; background: #f9fafb; opacity: 0.6; }
    tr.dismissed-done:hover { opacity: 0.8; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-pass { background: #dcfce7; color: #166534; }
    .badge-maybe { background: #fef9c3; color: #854d0e; }
    .badge-skip { background: #f3f4f6; color: #6b7280; }
    .badge-pending { background: #dbeafe; color: #1e40af; }

    .score {
      display: inline-block;
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 50%;
      font-weight: 700;
      font-size: 0.8rem;
    }
    .score-high { background: #dcfce7; color: #166534; }
    .score-mid { background: #fef9c3; color: #854d0e; }
    .score-low { background: #f3f4f6; color: #6b7280; }

    /* ── Detail panel ────────────────────────────── */
    .detail-cell { padding: 0 !important; }
    .detail-panel {
      padding: 1rem 1.5rem;
      background: #fafbfc;
      border-bottom: 2px solid #e5e7eb;
    }
    .detail-panel h4 { font-size: 0.8rem; color: #555; text-transform: uppercase; margin: 0.8rem 0 0.3rem; }
    .detail-panel h4:first-child { margin-top: 0; }
    .detail-panel p { font-size: 0.85rem; color: #333; }
    .detail-panel ul { list-style: none; padding: 0; }
    .detail-panel li {
      font-size: 0.82rem;
      padding: 0.15rem 0;
      padding-left: 1rem;
      position: relative;
    }
    .detail-panel li::before {
      content: "\2022";
      position: absolute;
      left: 0;
      color: #999;
    }
    .tag-blocker { color: #dc2626; }
    .tag-match { color: #16a34a; }
    .tag-gap { color: #ca8a04; }

    /* ── Info icons ──────────────────────────────── */
    .info-icons { white-space: nowrap; }
    .icon-badge {
      display: inline-block;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 700;
      margin-right: 2px;
      vertical-align: middle;
    }
    .icon-remote { background: #dbeafe; color: #1e40af; }
    .icon-en { background: #ede9fe; color: #6d28d9; }
    .icon-flag { background: #fef3c7; color: #92400e; }
    .icon-note { background: #e0e7ff; color: #3730a3; }

    /* ── Status select ────────────────────────────── */
    .status-cell { text-align: center; }
    .status-select {
      padding: 0.15rem 0.3rem;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 0.7rem;
      cursor: pointer;
      background: #fff;
    }
    .status-select.status-applied { background: #dcfce7; color: #166534; border-color: #16a34a; }
    .status-select.status-dismissed { background: #f3f4f6; color: #6b7280; border-color: #9ca3af; }
    .status-select.status-none { background: #fff; }

    /* ── Tag badges (detail panel) ───────────────── */
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.2rem; }
    .tag-badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      background: #f3f4f6;
      color: #374151;
      border-radius: 999px;
      font-size: 0.7rem;
    }

    /* ── Notes input ──────────────────────────────── */
    .notes-input {
      flex: 1;
      padding: 0.3rem 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.82rem;
      font-family: inherit;
    }

    /* ── Flag banner ─────────────────────────────── */
    .flag-banner {
      background: #fef3c7;
      border: 1px solid #fbbf24;
      border-radius: 6px;
      padding: 0.5rem 0.8rem;
      font-size: 0.82rem;
      color: #92400e;
      margin-bottom: 0.8rem;
    }

    /* ── Detail meta ─────────────────────────────── */
    .detail-meta {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .detail-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .rescore-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e7eb;
    }
    .rescore-section textarea {
      width: 100%;
      min-height: 120px;
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 0.82rem;
      font-family: inherit;
      resize: vertical;
      margin-top: 0.3rem;
    }

    .job-link {
      color: #2563eb;
      text-decoration: none;
      font-size: 0.82rem;
    }
    .job-link:hover { text-decoration: underline; }

    /* ── Pagination ───────────────────────────────── */
    .pagination {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
      margin-top: 1rem;
      font-size: 0.85rem;
    }

    /* ── Misc ─────────────────────────────────────── */
    .text-muted { color: #9ca3af; font-size: 0.8rem; }
    .ml-auto { margin-left: auto; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request.htmx-indicator { display: inline; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script>
    // Toggle detail panel: if already open, close it instead of re-fetching
    document.addEventListener('htmx:configRequest', function(e) {
      var row = e.detail.elt;
      if (!row.classList.contains('job-row')) return;
      var detailId = row.getAttribute('hx-target');
      var detailCell = document.querySelector(detailId);
      if (detailCell && detailCell.innerHTML.trim() !== '') {
        e.preventDefault();
        detailCell.innerHTML = '';
      }
    });

    // Column sorting
    document.addEventListener('click', function(e) {
      var th = e.target.closest('th.sortable');
      if (!th) return;
      var col = th.dataset.sort;
      var form = document.querySelector('.filter-bar');
      var sortInput = form.querySelector('input[name="sort"]');
      var orderInput = form.querySelector('input[name="order"]');
      var currentSort = sortInput.value;
      var currentOrder = orderInput.value;

      if (currentSort === col) {
        orderInput.value = currentOrder === 'desc' ? 'asc' : 'desc';
      } else {
        sortInput.value = col;
        orderInput.value = 'desc';
      }

      // Update arrow indicators
      document.querySelectorAll('th.sortable').forEach(function(h) {
        h.classList.remove('active');
        var arrow = h.querySelector('.sort-arrow');
        if (arrow) arrow.remove();
      });
      th.classList.add('active');
      var arrow = document.createElement('span');
      arrow.className = 'sort-arrow';
      arrow.innerHTML = orderInput.value === 'desc' ? '&#9660;' : '&#9650;';
      th.appendChild(arrow);

      // Trigger the filter form to re-fetch
      htmx.trigger(form, 'change');
    });
  </script>
</body>
</html>

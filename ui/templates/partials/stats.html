<div class="stats-bar">
  <div class="stat-card">
    <div class="label">Total</div>
    <div class="value">{{ stats.total }}</div>
  </div>
  <div class="stat-card pass">
    <div class="label">Pass</div>
    <div class="value">{{ stats.PASS }}</div>
  </div>
  <div class="stat-card maybe">
    <div class="label">Maybe</div>
    <div class="value">{{ stats.MAYBE }}</div>
  </div>
  <div class="stat-card skip">
    <div class="label">Skip</div>
    <div class="value">{{ stats.SKIP }}</div>
  </div>
  <div class="stat-card pending">
    <div class="label">Pending</div>
    <div class="value">{{ stats.pending }}</div>
  </div>
  <div class="stat-card applied">
    <div class="label">Applied</div>
    <div class="value">{{ stats.applied }}</div>
  </div>
  <div class="stat-card dismissed">
    <div class="label">Dismissed</div>
    <div class="value">{{ stats.dismissed }}</div>
  </div>
  <div class="stat-card error">
    <div class="label">Errors</div>
    <div class="value">{{ stats.error }}</div>
  </div>
  <div class="stat-card dead">
    <div class="label">Dead</div>
    <div class="value">{{ stats.dead }}</div>
  </div>
</div>

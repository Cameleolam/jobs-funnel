{% for job in jobs %}
{% include "partials/job_row_single.html" %}
{% else %}
<tr>
  <td colspan="9" class="text-muted empty-state">No jobs match these filters.</td>
</tr>
{% endfor %}

{% if total > offset + limit %}
{% set remaining = total - offset - limit %}
<tr id="load-more-row">
  <td colspan="9" style="text-align:center; padding:0.8rem;">
    <button class="btn btn-primary btn-sm"
            hx-get="/jobs?offset={{ offset + limit }}&limit={{ limit }}"
            hx-target="#load-more-row"
            hx-swap="outerHTML"
            hx-include=".filter-bar">
      Load more ({{ remaining }} remaining)
    </button>
    <button class="btn btn-sm btn-skip"
            hx-get="/jobs?offset={{ offset + limit }}&limit={{ remaining }}"
            hx-target="#load-more-row"
            hx-swap="outerHTML"
            hx-include=".filter-bar">
      Load all {{ remaining }}
    </button>
  </td>
</tr>
{% endif %}

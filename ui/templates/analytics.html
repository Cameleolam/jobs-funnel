{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/analytics.css">

<div class="analytics-shell view-all" data-analytics-view="all">
  <header class="analytics-header">
    <div>
      <h2 class="page-title">Analytics</h2>
      <p class="page-subtitle">Scoring, funnel, and market signals.</p>
    </div>
  </header>

  <div class="analytics-toolbar">
    <div class="analytics-view-controls" aria-label="Analytics view mode">
      <button type="button" class="analytics-view-button active" data-analytics-view-button="all">All</button>
      <button type="button" class="analytics-view-button" data-analytics-view-button="scoring">Scoring</button>
      <button type="button" class="analytics-view-button" data-analytics-view-button="funnel">Funnel</button>
      <button type="button" class="analytics-view-button" data-analytics-view-button="market">Market</button>
    </div>

    <div class="analytics-filters" aria-label="Analytics filters">
      <label>
        <span>Window</span>
        <select data-analytics-window>
          <option value="4">4w</option>
          <option value="8">8w</option>
          <option value="12" selected>12w</option>
          <option value="26">26w</option>
          <option value="52">52w</option>
        </select>
      </label>
      <label>
        <span>Topics</span>
        <select data-analytics-topic-limit>
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="50">50</option>
        </select>
      </label>
    </div>
  </div>

  <div class="analytics-grid">
    <section class="analytics-panel" id="analytics-scoring" data-analytics-endpoint="/api/analytics/scoring">
      <div class="analytics-panel-header">
        <h3>Scoring</h3>
        <span class="analytics-state" data-analytics-status>Loading</span>
      </div>
      <div class="analytics-empty" data-analytics-empty>Loading scoring analytics.</div>
    </section>

    <section class="analytics-panel" id="analytics-funnel" data-analytics-endpoint="/api/analytics/funnel">
      <div class="analytics-panel-header">
        <h3>Funnel</h3>
        <span class="analytics-state" data-analytics-status>Loading</span>
      </div>
      <div class="analytics-empty" data-analytics-empty>Loading funnel analytics.</div>
    </section>

    <section class="analytics-panel" id="analytics-market" data-analytics-endpoint="/api/analytics/market-shifts">
      <div class="analytics-panel-header">
        <h3>Market</h3>
        <span class="analytics-state" data-analytics-status>Loading</span>
      </div>
      <div class="analytics-empty" data-analytics-empty>Loading market analytics.</div>
    </section>
  </div>
</div>

<script src="/static/analytics.js"></script>
{% endblock %}
